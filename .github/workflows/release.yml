name: Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  test:
    name: Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:ci

  release:
    name: Build & Publish
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - run: npm ci

      # electron-builder: vite build + package + publish to GitHub Releases
      - name: Build and publish to GitHub Releases
        run: npx vite build && npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # Keep artifacts for 30 days as backup
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gym-manager-pro-${{ github.ref_name }}
          path: |
            dist/*.exe
            dist/latest.yml
          retention-days: 30
          if-no-files-found: warn
